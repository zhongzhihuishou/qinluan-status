<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青鸾 APP - 外网地址查询</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 { color: #6366f1; margin-bottom: 10px; font-size: 2rem; }
    .subtitle { color: #6b7280; margin-bottom: 30px; }
    .url-box {
      background: #f3f4f6;
      border: 2px solid #6366f1;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      word-break: break-all;
    }
    .url { font-size: 1.2rem; color: #1f2937; font-weight: 600; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      padding: 12px 30px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      margin: 5px;
    }
    .btn-download {
      background: linear-gradient(135deg, #07c160 0%, #06ae56 100%);
      font-size: 18px;
      padding: 16px 40px;
    }
    .btn-copy {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    }
    .info {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
      color: #6b7280;
      font-size: 0.9rem;
    }
    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 20px;
      background: #d1fae5;
      color: #065f46;
    }
    .qr-section {
      margin: 20px 0;
      padding: 20px;
      background: #f9fafb;
      border-radius: 12px;
    }
    .qr-code {
      width: 200px;
      height: 200px;
      margin: 10px auto;
      border-radius: 8px;
    }
    .tips {
      background: #fef3c7;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      text-align: left;
      font-size: 0.85rem;
      color: #92400e;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🕊️ 青鸾 APP</h1>
    <p class="subtitle">董事长专用智能助理</p>
    <span class="status">● 在线</span>
    
    <div class="qr-section">
      <div class="qr-code" id="qrCode"></div>
      <a href="#" class="btn btn-download" id="downloadBtn" target="_blank">📲 立即下载</a>
    </div>
    
    <div class="url-box">
      <div style="color: #6b7280; margin-bottom: 10px; font-size: 0.9rem;">当前外网地址</div>
      <div class="url" id="tunnel-url">加载中...</div>
    </div>
    
    <div>
      <a href="#" class="btn" id="visit-btn" target="_blank">🚀 立即访问</a>
      <button class="btn btn-copy" onclick="copyUrl()">📋 复制地址</button>
    </div>
    
    <div class="info">
      <p>📱 手机浏览器打开上方地址</p>
      <p>➕ 添加到主屏幕，像 APP 一样使用</p>
      <div class="tips">
        <strong>💡 使用提示：</strong><br>
        1. 扫码或点击下载按钮，打开青鸾 APP<br>
        2. 添加到主屏幕后，每次启动自动获取最新地址<br>
        3. 支持语音输入和语音播报
      </div>
      <p class="update-time" style="color: #9ca3af; font-size: 0.85rem; margin-top: 10px;">
        更新时间：<span id="updateTime"></span>
      </p>
    </div>
  </div>
  
  <script>
    // 当前青鸾 APP 地址
    const TUNNEL_URL = 'https://offerings-healthy-qty-bunch.trycloudflare.com';
    
    // 生成二维码（直接指向青鸾 APP）
    const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(TUNNEL_URL)}`;
    document.getElementById('qrCode').innerHTML = `<img src="${qrApi}" alt="下载二维码" style="width:100%;height:100%;border-radius:8px;">`;
    
    // 设置下载按钮和访问按钮
    document.getElementById('downloadBtn').href = TUNNEL_URL;
    document.getElementById('visit-btn').href = TUNNEL_URL;
    document.getElementById('tunnel-url').textContent = TUNNEL_URL;
    document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
    
    // 复制地址
    function copyUrl() {
      navigator.clipboard.writeText(TUNNEL_URL);
      alert('✅ 地址已复制到剪贴板！');
    }
  </script>
</body>
</html>
