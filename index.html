<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青鸾 APP - 外网地址查询</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 { color: #6366f1; margin-bottom: 10px; font-size: 2rem; }
    .subtitle { color: #6b7280; margin-bottom: 30px; }
    .url-box {
      background: #f3f4f6;
      border: 2px solid #6366f1;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      word-break: break-all;
    }
    .url { font-size: 1.2rem; color: #1f2937; font-weight: 600; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      padding: 12px 30px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      margin: 5px;
    }
    .btn-download {
      background: linear-gradient(135deg, #07c160 0%, #06ae56 100%);
    }
    .info {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
      color: #6b7280;
      font-size: 0.9rem;
    }
    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 20px;
      background: #d1fae5;
      color: #065f46;
    }
    .qr-section {
      margin: 20px 0;
      padding: 20px;
      background: #f9fafb;
      border-radius: 12px;
    }
    .qr-code {
      width: 150px;
      height: 150px;
      margin: 10px auto;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🕊️ 青鸾 APP</h1>
    <p class="subtitle">董事长专用智能助理</p>
    <span class="status">● 在线</span>
    
    <div class="qr-section">
      <h3 style="color:#111;margin-bottom:10px;">📱 扫码下载 APP</h3>
      <div class="qr-code" id="qrCode"></div>
      <a href="download.html" class="btn btn-download" target="_blank">📲 下载页面</a>
    </div>
    
    <div class="url-box">
      <div style="color: #6b7280; margin-bottom: 10px; font-size: 0.9rem;">外网访问地址</div>
      <div class="url" id="tunnel-url">https://offerings-healthy-qty-bunch.trycloudflare.com</div>
    </div>
    
    <a href="https://offerings-healthy-qty-bunch.trycloudflare.com" class="btn" target="_blank">立即访问</a>
    
    <div class="info">
      <p>📱 手机浏览器打开上方地址</p>
      <p>➕ 添加到主屏幕，像 APP 一样使用</p>
      <p style="color: #9ca3af; font-size: 0.85rem; margin-top: 10px;">
        地址会自动更新，请收藏此页面
      </p>
    </div>
  </div>
  
  <script>
    // 生成二维码
    const qrUrl = 'https://zhongzhihuishou.github.io/qinluan-status/download.html';
    const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrUrl)}`;
    document.getElementById('qrCode').innerHTML = `<img src="${qrApi}" alt="下载二维码" style="width:100%;height:100%;border-radius:8px;">`;
  </script>
</body>
</html>
